services:
  # Java Server with Bedrock Cross-play (Geyser)
  java-crossplay:
    image: itzg/minecraft-server:latest
    container_name: mc-java-geyser
    environment:
      EULA: ${EULA}
      TZ: ${TIMEZONE}
      TYPE: "PAPER" # Required for Geyser plugin
      VERSION: ${JAVA1_VERSION}
      MEMORY: ${JAVA1_MEMORY}
      # Automatically downloads Geyser & Floodgate for cross-play
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
    ports:
      - "25565:25565"     # Java port
      - "19132:19132/udp" # Bedrock port (translated via Geyser)
    volumes:
      - ${DATA_PATH}/java-crossplay:/data
    restart: unless-stopped

  # Native Bedrock Dedicated Server
  bedrock-native:
    image: itzg/minecraft-bedrock-server:latest
    container_name: mc-bedrock-only
    environment:
      EULA: ${EULA}
      TZ: ${TIMEZONE}
      VERSION: ${BEDROCK1_VERSION}
    ports:
      - "19133:19132/udp" # Different external port to avoid conflict
    volumes:
      - ${DATA_PATH}/bedrock-native:/data
    restart: unless-stopped
